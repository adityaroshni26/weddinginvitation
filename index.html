<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Wedding Invitation</title>\n    <style>\n        body {\n            font-family: 'Georgia', serif;\n            background: #f3f1e5; /* soft parchment background */\n            color: #333;\n            margin: 0;\n            padding: 0;\n        }\n        .hero {\n            text-align: center;\n            padding: 20px;\n            border-bottom: 2px solid gold;\n        }\n        .hero h1 {\n            font-size: 2em;\n            margin: 0;\n        }\n        .invitation-image {\n            display: flex;\n            justify-content: center;\n            padding: 20px;\n            background-image: url('path/to/mandala-pattern.png'); /* subtle mandala pattern */\n            background-size: cover;\n        }\n        .invitation-image img {\n            max-width: 100%;\n            height: auto;\n        }\n        .event-buttons {\n            display: flex;\n            justify-content: center;\n            margin: 20px 0;\n        }\n        .event-buttons a {\n            background: gold;\n            color: white;\n            padding: 10px 20px;\n            border-radius: 20px;\n            text-decoration: none;\n            margin: 0 10px;\n            border: 1px solid transparent;\n        }\n        .event-buttons a:hover {\n            border: 1px solid gold;\n        }\n        .footer {\n            text-align: center;\n            padding: 20px;\n            border-top: 2px solid gold;\n        }\n        @media (max-width: 420px) {\n            .hero h1 {\n                font-size: 1.5em;\n            }\n            .event-buttons a {\n                font-size: 0.9em;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class="hero">\n        <h1>Join Us for Our Wedding</h1>\n        <p>[Couple Names]</p>\n    </div>\n    <div class="invitation-image">\n        <img src="path/to/invitation-image.jpg" alt="Wedding Invitation">\n    </div>\n    <div class="event-buttons">\n        <a href="https://www.google.com/maps/place/Event+Location+1" target="_blank">Reception</a>\n        <a href="https://www.google.com/maps/place/Event+Location+2" target="_blank">Ceremony</a>\n    </div>\n    <div class="footer">\n        <p>We can't wait to celebrate with you!</p>\n    </div>\n</body>\n</html>
