<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aditya & Roshni Invite you to the wedding</title>

<meta property="og:title" content="Aditya & Roshni invite you to their wedding">
<meta property="og:description" content="17–19 April 2026 · Bangalore">
<meta property="og:image" content="https://adityaroshni26.github.io/weddinginvitation/cover.png">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

<div id="intro">

<div class="invite-card">

<h1>Aditya & Roshni</h1>

<p>invite you to celebrate their wedding</p>

<button onclick="openInvite()">Open Invitation</button>

</div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="site">

<div class="vines-left"></div>
<div class="vines-right"></div>

<div class="petals"></div>

<div class="container">

<header class="hero">

<h1>Aditya & Roshni</h1>

<p class="tagline">
Together with their families invite you to celebrate their wedding
</p>

<p class="wedding-date">
<strong>17–19 April 2026</strong>
</p>

<p class="location">
Bangalore
</p>

<div id="countdown" class="countdown-box"></div>

</header>

<section class="story">

<div class="story-section cover">
<img src="cover.png">
</div>

<div class="story-section engagement">

<h2>Engagement</h2>

<img src="engagement.png">

<a href="https://maps.google.com/?q=Radisson Blu Atria Bangalore" target="_blank">
<button class="engagement-btn">View Location</button>
</a>

</div>

<div class="story-section haldi">

<h2>Haldi & <span class="mehendi">Mehendi</span></h2>

<img src="haldi.png">

<a href="https://maps.google.com/?q=Sindhi Seva Samiti Bangalore" target="_blank">
<button class="haldi-btn">View Location</button>
</a>

</div>

<div class="story-section sangeet">

<h2>Sangeet</h2>

<img src="sangeet.png">

<a href="https://maps.google.com/?q=St Marks Radisson Hotel Bangalore" target="_blank">
<button class="sangeet-btn">View Location</button>
</a>

</div>

<div class="story-section wedding">

<h2>Wedding</h2>

<img src="wedding.png">

<a href="https://maps.google.com/?q=Chamra Vajra Mukta Jayamahal Road Bangalore" target="_blank">
<button class="wedding-btn">View Location</button>
</a>

</div>

</section>

<section class="rsvp">

<h2>RSVP</h2>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLScQY8RDx7FhXDMpcvY9gWnvVlF-vG9wHUNlErAZYsRXr1n-Bw/viewform?usp=header"
width="100%"
height="500"
frameborder="0">
</iframe>

</section>

<footer>

<p>We look forward to celebrating with you</p>

</footer>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
